<div class="row">
  <div class="col-md-4 mb-3" *ngFor="let libro of carrito">
    <app-libro-card [libro]="libro"></app-libro-card>
  </div>
</div>

<div *ngIf="carrito.length > 0" class="alert alert-info mt-3">
  Libros en carrito: {{ carrito.length }}
</div>

<button *ngIf="carrito.length > 0" class="btn btn-success mt-2" (click)="comprar()">Comprar</button>
